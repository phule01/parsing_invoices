# Docker Compose v2 — PRODUCTION (no 'version' key needed)
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: tool_orc_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - tool_orc_network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  fastapi:
    build:
      context: ./fast_app
      dockerfile: Dockerfile
    container_name: tool_orc_fastapi_prod
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      PYTHONUNBUFFERED: "1"
      DEBUG: "False"
      ENVIRONMENT: production
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      SECRET_KEY: ${SECRET_KEY}
      USER1_USERNAME: ${USER1_USERNAME:-admin}
      USER2_USERNAME: ${USER2_USERNAME:-user}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env
    networks:
      - tool_orc_network
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  email_listener:
    build:
      context: ./email_listener
      dockerfile: Dockerfile
    container_name: tool_orc_email_listener_prod
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      IMAP_SERVER: ${IMAP_SERVER:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOWNLOAD_DIR: /app/invoices
      API_BASE_URL: http://fastapi:8000
      API_USERNAME: ${API_USERNAME:-admin}
      API_PASSWORD: ${API_PASSWORD:-admin}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-300}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GEMINI_API_DELAY: ${GEMINI_API_DELAY:-2.0}
      GEMINI_API_TIMEOUT: ${GEMINI_API_TIMEOUT:-120}
      GEMINI_API_RETRIES: ${GEMINI_API_RETRIES:-3}
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    volumes:
      - invoice_files_prod:/app/invoices
      - ./.env:/app/.env
    networks:
      - tool_orc_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "10"

  # ── Web UI ───────────────────────────────────────────────────────────────
  web:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-}
    container_name: tool_orc_web_prod
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - tool_orc_network
    restart: always
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: tool_orc_nginx_prod
    ports:
      - "127.0.0.1:7300:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - tool_orc_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data_prod:
    driver: local
  invoice_files_prod:
    driver: local

networks:
  tool_orc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16
