version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tool_orc_postgres_prod
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "127.0.0.1:${DB_PORT}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - tool_orc_network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./fastapi_app
      dockerfile: Dockerfile
    container_name: tool_orc_fastapi_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      PYTHONUNBUFFERED: 1
      DEBUG: "False"
      ENVIRONMENT: production
    ports:
      - "127.0.0.1:${API_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fastapi_app/logs:/app/logs
    networks:
      - tool_orc_network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  email_listener:
    build:
      context: ./email_listener
      dockerfile: Dockerfile
    container_name: tool_orc_email_listener_prod
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      PYTHONUNBUFFERED: 1
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tool_orc_network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data_prod:

networks:
  tool_orc_network:
    driver: bridge
