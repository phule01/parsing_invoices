# Docker Compose v2 — no 'version' key needed
services:
  web:
    build:
      context: ./web_ui
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: "${REACT_APP_API_URL:-}"
    container_name: tool_orc_web
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - tool_orc_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:15-alpine
    container_name: tool_orc_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-tool_orc_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    networks:
      - tool_orc_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-tool_orc_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  fastapi:
    build:
      context: ./fast_app
      dockerfile: Dockerfile
    container_name: tool_orc_fastapi
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-tool_orc_db}
      PYTHONUNBUFFERED: "1"
      DEBUG: ${DEBUG:-False}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
      SECRET_KEY: ${SECRET_KEY}
      USER1_USERNAME: ${USER1_USERNAME:-admin}
      USER2_USERNAME: ${USER2_USERNAME:-user}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fast_app:/app
      - ./email_listener:/email_listener
      - invoice_files:/app/invoices
      - ./.env:/app/.env
    networks:
      - tool_orc_network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  email_listener:
    build:
      context: ./email_listener
      dockerfile: Dockerfile
    container_name: tool_orc_email_listener
    env_file: .env
    environment:
      PYTHONUNBUFFERED: "1"
      # Email credentials — also fetched at runtime from /api/settings/runtime
      # so Web UI changes take effect without restarting this container.
      IMAP_SERVER: ${IMAP_SERVER:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DOWNLOAD_DIR: /app/invoices
      API_BASE_URL: http://fastapi:8000
      API_USERNAME: ${API_USERNAME:-admin}
      API_PASSWORD: ${API_PASSWORD:-admin}
      SCAN_INTERVAL_SECONDS: ${SCAN_INTERVAL_SECONDS:-300}
      SCAN_ALL_MAIL: ${SCAN_ALL_MAIL:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      GEMINI_API_DELAY: ${GEMINI_API_DELAY:-2.0}
      GEMINI_API_TIMEOUT: ${GEMINI_API_TIMEOUT:-120}
      GEMINI_API_RETRIES: ${GEMINI_API_RETRIES:-3}
      GEMINI_BATCH_CONCURRENT: ${GEMINI_BATCH_CONCURRENT:-3}
    depends_on:
      postgres:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    volumes:
      - ./email_listener:/app
      - invoice_files:/app/invoices
      - ./.env:/app/.env
    networks:
      - tool_orc_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:alpine
    container_name: tool_orc_nginx
    ports:
      - "7300:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      fastapi:
        condition: service_healthy
    networks:
      - tool_orc_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  invoice_files:
    driver: local

networks:
  tool_orc_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
