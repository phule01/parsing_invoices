events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Increase max body size for large invoice uploads
    client_max_body_size 50M;

    server {
        listen 80;
        
        # DNS resolver for Docker internal network
        resolver 127.0.0.11 valid=10s;
        resolver_timeout 5s;

        # Define upstream variables for dynamic resolution
        set $fastapi_upstream http://fastapi:8000;
        set $web_upstream http://web:80;

        # Route WebSockets
        location /api/ws/ {
            proxy_pass $fastapi_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route Health
        location /health {
            proxy_pass $fastapi_upstream;
        }

        # Route API
        location /api/ {
            proxy_pass $fastapi_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route Web UI
        location / {
            proxy_pass $web_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
